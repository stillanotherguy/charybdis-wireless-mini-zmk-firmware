# Build matrix describing every board/shield/keymap combo to build.
# Each entry under `include` becomes a single matrix item in CI and
# the local build script.

board: [ nice_nano//zmk ]

include:

# ── Reset Firmware ────────────────────────────────────────────────────────────
  - name: settings_reset
    board: nice_nano//zmk
    shield: settings_reset

# ── Bluetooth (BT) Firmwares ─────────────────────────────────────────────────────────────
  - name: bt
    board: nice_nano//zmk
    shield:
      - charybdis_left_bt
      - charybdis_right_bt
    keymap:
      - qwerty

# ── Standard Dongle Firmwares ─────────────────────────────────────────────────
  - name: dongle_standard_nano
    board: nice_nano//zmk
    shield:
      - charybdis_left_dongle
      - charybdis_right_dongle
      - charybdis_dongle
    keymap:
      - qwerty
